# DigitalOcean App Platform spec — runs the whole stack from this repo.
#
#   Create → Apps → connect GitHub (modzincltd/beerfund) → it auto-loads this
#   spec. Then set the SECRET env values (DATABASE_URL, HELIUS_API_KEY,
#   ANTHROPIC_API_KEY) in the UI. See deploy/APP_PLATFORM.md.
#
# One app, one domain. The API is routed at /api and the dashboard at / — so the
# browser only ever calls the same origin: no CORS, no separate API host, no TLS
# to manage. `git push` redeploys every component.
name: beerfund
region: lon

# Shared secrets/vars — set once, inherited by all components. Fill the SECRET
# values in the dashboard after the first import (they are not stored in git).
envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
  - key: HELIUS_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ANTHROPIC_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: BEERFUND_AI_MODEL
    scope: RUN_TIME
    value: claude-sonnet-4-6
  - key: WALLETS
    scope: RUN_TIME
    value: "2QMCjkbBAkgvW9Az4ThWCUjB6L5oFfTgpbxeCrLi2xvQ"

# ---- Dashboard (free static site) ------------------------------------------
static_sites:
  - name: web
    source_dir: /web
    github:
      repo: modzincltd/beerfund
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm run build
    output_dir: out
    routes:
      - path: /
    envs:
      # Same-origin: the dashboard calls /api/... which the ingress sends to the
      # API component. Baked in at build time.
      - key: NEXT_PUBLIC_API_BASE
        scope: BUILD_TIME
        value: /api

# ---- Read API (FastAPI) ----------------------------------------------------
services:
  - name: api
    source_dir: /
    github:
      repo: modzincltd/beerfund
      branch: main
      deploy_on_push: true
    environment_slug: python
    run_command: uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8080}
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      # Ingress strips the /api prefix, so /api/summary -> /summary at the app.
      - path: /api
    health_check:
      http_path: /health

# ---- Paper daemon + audit sweep (background workers) -----------------------
workers:
  - name: paper
    source_dir: /
    github:
      repo: modzincltd/beerfund
      branch: main
      deploy_on_push: true
    environment_slug: python
    # DATABASE_URL is set, so the daemon persists state/trades to Postgres and
    # survives redeploys (see beerfund/paper_store.py).
    run_command: python paper_trader.py
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: PAPER_SIZE
        scope: RUN_TIME
        value: "0.5"
      - key: PAPER_POLL
        scope: RUN_TIME
        value: "15"
      - key: PAPER_MIN_SIGNAL
        scope: RUN_TIME
        value: "1.0"
      - key: PAPER_MAX_POSITIONS
        scope: RUN_TIME
        value: "8"

  # Optional (~$5/mo) — automated weekly re-sweep of the follow pool +
  # discovery candidates (wallets rot). Delete this worker to save the cost; the
  # dashboard's "Find new wallets" button still audits on demand.
  - name: audit
    source_dir: /
    github:
      repo: modzincltd/beerfund
      branch: main
      deploy_on_push: true
    environment_slug: python
    run_command: python audit_runner.py --follow --candidates --interval 604800
    instance_count: 1
    instance_size_slug: basic-xxs
